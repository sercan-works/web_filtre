<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Engellendi - ATLANTIS</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="container">
    <div class="shield">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h1 class="brand">ATLANTIS</h1>
    <h2>Bu Sayfa Engellendi</h2>
    <p class="desc">Bu web sayfasina erisim, ATLANTIS eklentisi tarafindan engellenmistir.</p>
    <div class="info">
      <div class="info-row">
        <span class="label">Engellenen adres:</span>
        <span class="value" id="blockedUrl"></span>
      </div>
      <div class="info-row">
        <span class="label">Engelleme sebebi:</span>
        <span class="value" id="blockedReason"></span>
      </div>
      <div class="info-row">
        <span class="label">Eslesen kural:</span>
        <span class="value" id="blockedMatch"></span>
      </div>
    </div>
    <button class="btn" onclick="history.back()">Geri Don</button>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
